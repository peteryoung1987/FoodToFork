<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fridge to Fork</title>

  <style>
    :root {
      --cream:#F7F3EE; --ink:#1C1917; --accent:#C2410C;
      --border:#E7E2DC; --card:#FFFFFF; --radius:12px;
      --warn:#B91C1C; --soon:#D97706;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--ink);line-height:1.5;padding-bottom:60px;}

    header{background:var(--ink);color:var(--cream);padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
    header h1{font-family:Georgia,'Times New Roman',serif;font-size:1.4rem;}
    .hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
    .sync-btn{background:none;border:none;color:var(--cream);cursor:pointer;font-size:0.75rem;opacity:0.8;text-decoration:underline;padding:0;}
    .sync-btn:disabled{opacity:0.4;cursor:default;}
    #status{font-size:0.65rem;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;}
    .status-ready{background:#065F46;color:#D1FAE5;}
    .status-busy{background:var(--accent);color:white;}

    .tabs{background:var(--ink);display:flex;padding:0 1rem;gap:0.5rem;border-bottom:1px solid #2C2927;position:sticky;top:56px;z-index:99;}
    .tab{font-size:0.75rem;font-weight:700;color:#A8A29E;padding:0.9rem 0.5rem;border:none;background:none;cursor:pointer;text-transform:uppercase;border-bottom:3px solid transparent;}
    .tab.active{color:var(--cream);border-bottom-color:var(--accent);}

    .view{display:none;padding:1.25rem 1rem;max-width:520px;margin:0 auto;}
    .view.active{display:block;}

    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
    .card h2{margin-bottom:0.75rem;}

    label{display:block;font-size:0.65rem;font-weight:700;text-transform:uppercase;color:#78716C;margin:10px 0 4px;}
    input,select{width:100%;padding:0.7rem;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.95rem;background:#FAFAFA;}
    input:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

    .btn{width:100%;padding:0.85rem;border-radius:10px;border:none;font-family:inherit;font-weight:700;font-size:0.9rem;cursor:pointer;transition:opacity .15s,transform .1s;}
    .btn-p{background:var(--accent);color:white;}
    .btn-s{background:white;border:1px solid var(--border);color:#44403C;}
    .btn:active{transform:scale(0.98);opacity:0.9;}
    .btn:disabled{opacity:0.5;cursor:default;}

    .group-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;color:#A8A29E;margin:1rem 0 0.4rem;}
    .ing-card{background:white;border:1px solid var(--border);border-radius:10px;margin-bottom:0.6rem;overflow:hidden;}
    .ing-row{display:flex;justify-content:space-between;align-items:center;padding:0.9rem 1rem;}
    .ing-info{flex:1;cursor:pointer;}
    .ing-info small{color:#71717A;font-size:0.8rem;}
    .del-btn{background:none;border:none;color:#A8A29E;font-size:1rem;cursor:pointer;padding:0 0 0 0.5rem;}
    .del-btn:hover{color:var(--warn);}
    .iep{padding:0.75rem 1rem 1rem;border-top:1px dashed var(--border);background:#FAFAFA;}

    .expiry-tag{font-weight:700;padding:1px 5px;border-radius:4px;font-size:0.65rem;}
    .expiry-critical{color:var(--warn);background:#FEE2E2;}
    .expiry-soon{color:var(--soon);background:#FEF3C7;}

    .plan-container{margin-top:1rem;}
    .day-card{background:white;border:1px solid var(--border);border-radius:12px;margin-bottom:1.25rem;overflow:hidden;}
    .day-h{background:var(--ink);color:white;padding:0.75rem 1.25rem;font-family:Georgia,'Times New Roman',serif;font-size:1.05rem;}
    .day-date{font-family:'DM Sans',sans-serif;font-size:0.75rem;opacity:0.6;margin-left:8px;}
    .m-box{padding:1rem 1.25rem;border-bottom:1px solid var(--border);}
    .m-box:last-child{border-bottom:none;}
    .meal-link{color:var(--accent);text-decoration:underline;cursor:pointer;font-weight:500;margin-top:4px;}
    .meal-actions{display:flex;gap:6px;margin-top:10px;}
    .action-btn{width:auto;font-size:0.65rem;padding:5px 12px;}

    .staple-input-group{display:flex;gap:8px;align-items:flex-end;}
    .staple-input-group input{margin-bottom:0;}
    .staple-input-group .btn{width:auto;padding:0.7rem 1rem;}
    .tag-container{display:flex;flex-wrap:wrap;gap:6px;margin-top:1rem;}
    .staple-tag{background:#E7E2DC;padding:5px 12px;border-radius:20px;font-size:0.8rem;display:flex;align-items:center;gap:6px;}
    .staple-tag span{cursor:pointer;color:#991B1B;font-weight:bold;}

    .recipe-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:2000;overflow-y:auto;padding:1.5rem 1rem;}
    .recipe-inner{max-width:560px;margin:0 auto;padding-bottom:60px;}
    .recipe-title{font-family:Georgia,'Times New Roman',serif;margin-bottom:1.25rem;}
    .recipe-body{line-height:1.7;color:#44403C;white-space:pre-wrap;}
  </style>
</head>
<body>

<header>
  <h1>Fridge to Fork</h1>
  <div class="hdr-r">
    <button id="syncBtn" class="sync-btn" onclick="syncNow()">🔄 Sync</button>
    <span id="status" class="status-ready">Ready</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" id="t-plan" onclick="sh('plan')">Plan</button>
  <button class="tab" id="t-ings"  onclick="sh('ings')">Fridge</button>
  <button class="tab" id="t-set"   onclick="sh('set')">Settings</button>
</nav>

<!-- PLAN -->
<main id="v-plan" class="view active">
  <button class="btn btn-p" id="gBtn" onclick="generatePlan()">✨ Generate 7-Day Plan</button>
  <div id="pCont" class="plan-container"></div>
</main>

<!-- FRIDGE -->
<main id="v-ings" class="view">
  <section class="card">
    <h3 id="editor-title">Add Item</h3>
    <input type="hidden" id="edit-idx" value="-1">
    <label>Item Name</label>
    <input type="text" id="n" placeholder="e.g. Salmon Fillets">
    <div class="grid-2">
      <div><label>Qty</label><input type="number" id="q" value="1" min="0" step="any"></div>
      <div><label>Unit</label>
        <select id="u">
          <option>units</option><option>g</option><option>kg</option>
          <option>ml</option><option>l</option><option>packs</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div><label>Category</label>
        <select id="cat">
          <option>Protein</option><option>Veg</option><option>Dairy</option>
          <option>Carbs</option><option>Other</option>
        </select>
      </div>
      <div><label>Storage</label>
        <select id="store">
          <option>Fridge</option><option>Freezer</option><option>Pantry</option>
        </select>
      </div>
    </div>
    <label>Use By Date</label>
    <input type="date" id="ub">
    <div class="grid-2" style="margin-top:1rem;">
      <button class="btn btn-p" id="save-btn" onclick="saveItem()">Save to Fridge</button>
      <button class="btn btn-s" id="cancel-btn" onclick="resetForm()" style="display:none;">Cancel</button>
    </div>
  </section>
  <div id="iList"></div>
</main>

<!-- SETTINGS -->
<main id="v-set" class="view">
  <div class="card">
    <h2>My Staples</h2>
    <div class="staple-input-group">
      <input type="text" id="newStaple" placeholder="e.g. Olive Oil" onkeydown="if(event.key==='Enter')addStaple()">
      <button class="btn btn-p" onclick="addStaple()">Add</button>
    </div>
    <div id="stapleTags" class="tag-container"></div>
  </div>
  <div class="card">
    <h2>System Config</h2>
    <label>Gemini API Key</label>
    <input type="password" id="ak" placeholder="Paste key here">
    <label>Apps Script URL</label>
    <input type="text" id="su" placeholder="https://script.google.com/...">
    <button class="btn btn-p" style="margin-top:1rem;" onclick="saveCredentials()">Save Credentials</button>
  </div>
</main>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const STATE_KEY = 'ftf_v3';
let state = { ings:[], staples:[], plan:{days:[]}, ak:'', su:'' };

(function load() {
  try {
    const s = localStorage.getItem(STATE_KEY);
    if (s) {
      const p = JSON.parse(s);
      state = {...state, ...p};
      if (!Array.isArray(state.staples)) state.staples = [];
      if (!Array.isArray(state.ings))    state.ings = [];
      if (!state.plan || !Array.isArray(state.plan.days)) state.plan = {days:[]};
    }
  } catch(e) { console.warn('State load error:', e); }
})();

function persist() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }

function normaliseDate(raw) {
  if (!raw) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(raw)) {
    const [d,m,y] = raw.split('/'); return `${y}-${m}-${d}`;
  }
  try { const dt = new Date(raw); if (!isNaN(dt)) return dt.toISOString().split('T')[0]; } catch(_){}
  return '';
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderFridge() {
  const list = document.getElementById('iList');
  if (!state.ings.length) {
    list.innerHTML = '<p style="text-align:center;color:#A8A29E;padding:2rem;">Fridge is empty.</p>';
    return;
  }
  const groups = {};
  state.ings.forEach((item,idx) => {
    const g = item.Storage || 'Fridge';
    if (!groups[g]) groups[g] = [];
    groups[g].push({item,idx});
  });
  list.innerHTML = Object.entries(groups).map(([g,entries]) => `
    <h4 class="group-label">${g}</h4>
    ${entries.map(({item,idx}) => {
      const exp = expiryTag(item['Use By']);
      return `<div class="ing-card">
        <div class="ing-row">
          <div class="ing-info" onclick="toggleEdit(${idx})">
            <strong>${item.Item}</strong><br>
            <small>${item.Qty} ${item.Unit||'units'}${item.Category?' · '+item.Category:''}${exp}</small>
          </div>
          <button class="del-btn" onclick="deleteItem(${idx})">✕</button>
        </div>
        <div id="ep-${idx}" class="iep" style="display:none;">
          <div class="grid-2">
            <div><label>Qty</label><input type="number" id="eq-${idx}" value="${item.Qty}" min="0" step="any"></div>
            <div><label>Unit</label><select id="eu-${idx}">${['units','g','kg','ml','l','packs'].map(u=>`<option${u===item.Unit?' selected':''}>${u}</option>`).join('')}</select></div>
          </div>
          <div class="grid-2">
            <div><label>Category</label><select id="ec-${idx}">${['Protein','Veg','Dairy','Carbs','Other'].map(c=>`<option${c===item.Category?' selected':''}>${c}</option>`).join('')}</select></div>
            <div><label>Storage</label><select id="es-${idx}">${['Fridge','Freezer','Pantry'].map(s=>`<option${s===item.Storage?' selected':''}>${s}</option>`).join('')}</select></div>
          </div>
          <label>Use By</label>
          <input type="date" id="eub-${idx}" value="${normaliseDate(item['Use By'])}">
          <button class="btn btn-p" style="margin-top:8px;" onclick="saveInlineEdit(${idx})">Update</button>
        </div>
      </div>`;
    }).join('')}
  `).join('');
}

function expiryTag(raw) {
  const d = normaliseDate(raw); if (!d) return '';
  const diff = Math.ceil((new Date(d) - new Date().setHours(0,0,0,0)) / 86400000);
  if (diff < 0)   return ' · <span class="expiry-tag expiry-critical">Expired</span>';
  if (diff === 0) return ' · <span class="expiry-tag expiry-critical">Today!</span>';
  if (diff <= 2)  return ` · <span class="expiry-tag expiry-critical">Exp ${diff}d</span>`;
  if (diff <= 5)  return ` · <span class="expiry-tag expiry-soon">Exp ${diff}d</span>`;
  return '';
}

function renderMealPlan() {
  const cont = document.getElementById('pCont');
  if (!state.plan?.days?.length) {
    cont.innerHTML = '<p style="text-align:center;color:#A8A29E;padding:2rem;">No plan yet — hit Generate above.</p>';
    return;
  }
  const today = new Date().setHours(0,0,0,0);
  const days = state.plan.days.filter(d => {
    const [dd,mm,yy] = d.date.split('/');
    return new Date(yy,mm-1,dd) >= today;
  }).sort((a,b) => {
    const [ad,am,ay]=a.date.split('/'), [bd,bm,by]=b.date.split('/');
    return new Date(ay,am-1,ad) - new Date(by,bm-1,bd);
  });
  if (!days.length) {
    cont.innerHTML = '<p style="text-align:center;color:#A8A29E;padding:2rem;">Plan has expired — generate a new one.</p>';
    return;
  }
  const esc = s => (s||'').replace(/'/g,"\\'");
  cont.innerHTML = days.map(d => `
    <div class="day-card">
      <div class="day-h">${d.day}<span class="day-date">${d.date}</span></div>
      <div class="m-box">
        <label>🥗 Lunch</label>
        <p class="meal-link" onclick="getRecipe('${esc(d.lunch)}')">${d.lunch||'—'}</p>
      </div>
      <div class="m-box">
        <label>🍽️ Dinner</label>
        <p class="meal-link" onclick="getRecipe('${esc(d.dinner)}')">${d.dinner||'—'}</p>
        <div class="meal-actions">
          <button class="btn btn-s action-btn" onclick="regenMeal('${d.date}')">🎲 Regen</button>
          <button class="btn btn-s action-btn" onclick="hintMeal('${d.date}')">💡 Hint</button>
        </div>
      </div>
    </div>`).join('');
}

function renderStapleTags() {
  document.getElementById('stapleTags').innerHTML = (state.staples||[]).map((s,i) => `
    <div class="staple-tag">${s}<span onclick="removeStaple(${i})">×</span></div>`).join('');
}

function setStatus(msg) {
  const el = document.getElementById('status');
  el.innerText = msg;
  el.className = msg === 'Ready' ? 'status-ready' : 'status-busy';
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function sh(v) {
  document.querySelectorAll('.view,.tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  document.getElementById('t-'+v).classList.add('active');
  if (v==='ings')  renderFridge();
  if (v==='set')   renderStapleTags();
  if (v==='plan')  renderMealPlan();
}

// ── FRIDGE ACTIONS ─────────────────────────────────────────────────────────
function saveItem() {
  const name = document.getElementById('n').value.trim();
  if (!name) return alert('Give it a name.');
  const item = {
    Item: name,
    Qty:  document.getElementById('q').value,
    Unit: document.getElementById('u').value,
    Category: document.getElementById('cat').value,
    Storage:  document.getElementById('store').value,
    'Use By': document.getElementById('ub').value
  };
  const idx = parseInt(document.getElementById('edit-idx').value);
  if (idx === -1) state.ings.push(item); else state.ings[idx] = item;
  persist(); resetForm(); renderFridge(); pushAll();
}

function resetForm() {
  document.getElementById('edit-idx').value = '-1';
  document.getElementById('n').value = '';
  document.getElementById('q').value = '1';
  document.getElementById('ub').value = '';
  document.getElementById('editor-title').innerText = 'Add Item';
  document.getElementById('save-btn').innerText = 'Save to Fridge';
  document.getElementById('cancel-btn').style.display = 'none';
}

function toggleEdit(idx) {
  const p = document.getElementById('ep-'+idx);
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

function saveInlineEdit(idx) {
  state.ings[idx] = { ...state.ings[idx],
    Qty:      document.getElementById('eq-'+idx).value,
    Unit:     document.getElementById('eu-'+idx).value,
    Category: document.getElementById('ec-'+idx).value,
    Storage:  document.getElementById('es-'+idx).value,
    'Use By': document.getElementById('eub-'+idx).value
  };
  persist(); renderFridge(); pushAll();
}

function deleteItem(idx) {
  if (confirm(`Delete "${state.ings[idx].Item}"?`)) {
    state.ings.splice(idx,1);
    persist(); renderFridge(); pushAll();
  }
}

// ── STAPLES ────────────────────────────────────────────────────────────────
function addStaple() {
  const v = document.getElementById('newStaple').value.trim();
  if (!v) return;
  if (state.staples.includes(v)) return alert('Already in your staples.');
  state.staples.push(v);
  document.getElementById('newStaple').value = '';
  persist(); renderStapleTags();
}

function removeStaple(idx) {
  state.staples.splice(idx,1);
  persist(); renderStapleTags();
}

// ── CREDENTIALS ────────────────────────────────────────────────────────────
function saveCredentials() {
  state.ak = document.getElementById('ak').value.trim();
  state.su = document.getElementById('su').value.trim();
  persist(); alert('Saved.');
}

// ── SYNC ───────────────────────────────────────────────────────────────────
async function syncNow() {
  if (!state.su) return alert('Add your Apps Script URL in Settings first.');
  setStatus('Syncing…');
  document.getElementById('syncBtn').disabled = true;
  try {
    const r = await fetch(state.su.trim() + '?t=' + Date.now(), {
      method: 'GET',
      credentials: 'omit',
      redirect: 'follow',
    });
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    state.ings    = (d.ingredients||[]).map(i=>({...i,'Use By':normaliseDate(i['Use By'])}));
    state.staples = d.staples||[];
    if (d.plan && Array.isArray(d.plan.days)) state.plan = d.plan;
    persist(); renderFridge(); renderMealPlan(); renderStapleTags();
    setStatus('Ready');
  } catch(e) {
    alert('Sync failed: '+e.message);
    setStatus('Ready');
  }
  document.getElementById('syncBtn').disabled = false;
}

async function pushAll() {
  if (!state.su) return;
  setStatus('Saving…');
  try {
    await fetch(state.su.trim(), {method:'POST', mode:'no-cors', body: JSON.stringify({action:'pushAll',...state})});
  } catch(e) { console.error('Push failed:',e); }
  setStatus('Ready');
}

// ── AI ─────────────────────────────────────────────────────────────────────
const MODEL = 'gemini-2.0-flash-lite';

async function gemini(prompt) {
  const r = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${state.ak}`,
    {method:'POST', headers:{'Content-Type':'application/json'},
     body: JSON.stringify({contents:[{parts:[{text:prompt}]}]})}
  );
  if (!r.ok) throw new Error('Gemini HTTP '+r.status);
  return r.json();
}

async function generatePlan() {
  if (!state.ak) return alert('Add your Gemini API Key in Settings first.');
  const btn = document.getElementById('gBtn');
  btn.disabled = true; btn.innerText = '⏳ Consulting Chef…';

  const today = new Date();
  const dates = Array.from({length:7}, (_,i) => {
    const d = new Date(today); d.setDate(today.getDate()+i);
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yyyy = d.getFullYear();
    const day = d.toLocaleDateString('en-GB',{weekday:'long'});
    return `${dd}/${mm}/${yyyy} (${day})`;
  }).join(', ');

  const prompt = `You are a meal planning assistant for a UK household.
LUNCH: Single adult male. High volume, low calorie, centred on one protein. Keep it varied.
DINNER: Family of 3 (2 adults, 1 girl aged 9). Must include a Sunday Roast on the Sunday. Family-friendly.
FRIDGE/FREEZER INVENTORY: ${state.ings.map(i=>`${i.Qty}${i.Unit} ${i.Item}`).join(', ')||'Nothing specific'}.
USER STAPLES: ${state.staples.join(', ')||'None'}.
UNIVERSAL PANTRY: Assume all standard UK pantry essentials available.
Plan meals for EXACTLY these 7 dates in order: ${dates}.
Use the exact date strings provided (DD/MM/YYYY format). Do not invent or change any dates.
Return ONLY valid JSON, no markdown fences:
{"days":[{"date":"DD/MM/YYYY","day":"Monday","lunch":"meal name","dinner":"meal name","used_ings":["item"]}]}`;

  try {
    const d = await gemini(prompt);
    const text = d.candidates[0].content.parts[0].text.replace(/```json|```/gi,'').trim();
    const parsed = JSON.parse(text);
    if (!parsed.days || parsed.days.length < 7) throw new Error('Gemini returned an incomplete plan — try again.');
    state.plan = parsed;
    persist(); renderMealPlan(); pushAll();
  } catch(e) { alert('Could not generate plan: ' + e.message); console.error(e); }
  btn.disabled = false; btn.innerText = '✨ Generate 7-Day Plan';
}

async function getRecipe(meal) {
  if (!meal) return;
  const overlay = document.createElement('div');
  overlay.className = 'recipe-overlay'; overlay.id = 'recipe-overlay';
  overlay.innerHTML = `<div class="recipe-inner"><p style="text-align:center;padding:3rem;">⏳ Preparing ${meal}…</p></div>`;
  document.body.appendChild(overlay);

  const prompt = `Write a clear, friendly recipe for "${meal}" using UK measurements.
Available: ${state.ings.map(i=>i.Item).join(', ')}. Staples: ${state.staples.join(', ')}.
Standard UK pantry available.
Include: ingredient list, method, short shopping list with approximate UK prices for anything not in inventory.
Tone: direct, warm, no fluff.`;

  try {
    const d = await gemini(prompt);
    const text = d.candidates[0].content.parts[0].text;
    overlay.innerHTML = `
      <div class="recipe-inner">
        <h1 class="recipe-title">${meal}</h1>
        <div class="recipe-body">${text.replace(/\n/g,'<br>')}</div>
        <button class="btn btn-p" style="margin-top:2rem;" onclick="document.getElementById('recipe-overlay').remove()">← Back to Plan</button>
      </div>`;
  } catch(e) {
    overlay.innerHTML = `<div class="recipe-inner" style="text-align:center;">
      <p>Could not load recipe.</p>
      <button class="btn btn-p" onclick="document.getElementById('recipe-overlay').remove()">← Back</button>
    </div>`;
  }
}

async function regenMeal(date, hint='') {
  setStatus('Rerolling…');
  const prompt = `Suggest a new dinner for ${date} for a UK family of 3 (2 adults, 9yo girl).${hint?' Hint: '+hint:''}
Inventory: ${state.ings.map(i=>i.Item).join(', ')}. Standard UK pantry available.
Return ONLY valid JSON: {"dinner":"meal name","used_ings":["item"]}`;
  try {
    const d = await gemini(prompt);
    const text = d.candidates[0].content.parts[0].text.replace(/```json|```/gi,'').trim();
    const res = JSON.parse(text);
    const idx = state.plan.days.findIndex(x=>x.date===date);
    if (idx !== -1) {
      state.plan.days[idx].dinner    = res.dinner;
      state.plan.days[idx].used_ings = res.used_ings||[];
      persist(); renderMealPlan(); pushAll();
    }
  } catch(e) { alert('Could not regenerate meal.'); }
  setStatus('Ready');
}

function hintMeal(date) {
  const h = prompt('What are you thinking for this dinner?');
  if (h?.trim()) regenMeal(date, h.trim());
}

// ── INIT ───────────────────────────────────────────────────────────────────
document.getElementById('ak').value = state.ak||'';
document.getElementById('su').value = state.su||'';

// Demo data so the preview is useful without real credentials
if (!state.plan.days.length) {
  const today = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  state.plan.days = Array.from({length:7}, (_,i) => {
    const d = new Date(today); d.setDate(today.getDate()+i);
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yyyy = d.getFullYear();
    return {
      date:`${dd}/${mm}/${yyyy}`, day:days[d.getDay()],
      lunch: ['Chicken & rice bowls','Tuna salad wrap','Turkey meatballs & courgetti','Prawn stir-fry','Egg white omelette','Cottage cheese & crackers','Smoked salmon bagel'][i],
      dinner: i===0?'Sunday Roast (Chicken)':['Spaghetti Bolognese','Chicken Tikka Masala','Fish Pie','Beef Tacos','Homemade Pizza','Lamb Chops & Veg'][i-1],
      used_ings:[]
    };
  });
  state.ings = [
    {Item:'Chicken Breasts',Qty:4,Unit:'units',Category:'Protein',Storage:'Fridge','Use By':'2025-05-05'},
    {Item:'Salmon Fillets',Qty:2,Unit:'units',Category:'Protein',Storage:'Freezer','Use By':''},
    {Item:'Whole Milk',Qty:2,Unit:'l',Category:'Dairy',Storage:'Fridge','Use By':'2025-05-04'},
    {Item:'Broccoli',Qty:1,Unit:'units',Category:'Veg',Storage:'Fridge','Use By':'2025-05-06'},
    {Item:'Basmati Rice',Qty:500,Unit:'g',Category:'Carbs',Storage:'Pantry','Use By':''},
    {Item:'Cheddar',Qty:200,Unit:'g',Category:'Dairy',Storage:'Fridge','Use By':'2025-05-10'},
  ];
  state.staples = ['Olive Oil','Salt','Pepper','Garlic','Onions','Eggs'];
}

sh('plan');
if (state.su) syncNow();
</script>
