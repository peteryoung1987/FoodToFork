<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge to Fork v2.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #F7F3EE; --ink: #1C1917; --accent: #C2410C; --border: #E7E2DC; --card: #FFFFFF; --radius: 12px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); padding-bottom: 50px; }
        header { background: var(--ink); color: var(--cream); padding: 1.25rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
        #status { font-size: 0.7rem; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; }
        .tabs { background: var(--ink); display: flex; padding: 0 1rem; gap: 0.5rem; border-bottom: 1px solid #2C2927; }
        .tab { font-size: 0.75rem; font-weight: 700; color: #A8A29E; padding: 1rem; border: none; background: none; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--cream); border-bottom: 3px solid var(--accent); }
        .view { display: none; padding: 1.5rem 1rem; max-width: 500px; margin: 0 auto; }
        .view.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; color: #78716C; }
        input, select { width: 100%; padding: 0.7rem; margin-bottom: 1rem; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.9rem; }
        .btn { width: 100%; padding: 0.9rem; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-p { background: var(--accent); color: white; }
        .btn-s { background: white; border: 2px solid var(--border); color: #44403C; margin-top: 10px; }
        .ing-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: white; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 0.75rem; }
        .day-card { background: white; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1.25rem; overflow: hidden; }
        .day-h { background: var(--ink); color: white; padding: 0.75rem 1.25rem; font-family: 'Playfair Display', serif; }
        .m-box { padding: 1rem; border-bottom: 1px solid var(--border); }
        .m-box p { font-size: 0.95rem; line-height: 1.4; color: #44403C; }
        .recipe-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 2rem; }
        .staple-tag { background: #E7E2DC; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    </style>
</head>
<body>

<header><h1>Fridge to Fork</h1><span id="status">Ready</span></header>

<div class="tabs">
    <button class="tab" id="t-plan" onclick="sh('plan')">Plan</button>
    <button class="tab" id="t-ings" onclick="sh('ings')">Fridge</button>
    <button class="tab" id="t-set" onclick="sh('set')">Settings</button>
</div>

<div id="v-plan" class="view">
    <button class="btn btn-p" id="gBtn" onclick="generate()">✨ Generate New 7-Day Plan</button>
    <div id="pCont" style="margin-top:1rem;"></div>
</div>

<div id="v-ings" class="view">
    <div class="card">
        <label>Ingredient</label><input type="text" id="n" placeholder="Salmon">
        <div style="display:flex; gap:10px;">
            <div style="flex:1"><label>Qty</label><input type="number" id="q" value="1"></div>
            <div style="flex:1"><label>Unit</label><select id="u"><option>units</option><option>g</option><option>ml</option></select></div>
        </div>
        <button class="btn btn-p" onclick="pushItem()">Add to Fridge</button>
        <button class="btn btn-s" onclick="sync()">🔄 Refresh from Sheet</button>
    </div>
    <div id="iList"></div>
</div>

<div id="v-set" class="view">
    <div class="card">
        <h2>Staples</h2>
        <div style="display:flex; gap:8px;"><input type="text" id="newStaple"><button class="btn btn-p" style="width:auto" onclick="addStapleTag()">Add</button></div>
        <div id="stapleTags" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px;"></div>
        <button class="btn btn-p" style="margin-top:20px;" onclick="pushAll()">💾 Sync Everything</button>
    </div>
    <div class="card">
        <label>Gemini API Key</label><input type="password" id="ak">
        <label>Apps Script URL</label><input type="text" id="su">
        <button class="btn btn-s" onclick="saveS()">Save Credentials</button>
    </div>
</div>

<script>
let state = { ings: [], staples: [], plan: { days: [] }, ak: '', su: '' };
const saved = localStorage.getItem('ftf_v2');
if (saved) state = JSON.parse(saved);

function sh(v) {
    document.querySelectorAll('.view, .tab').forEach(e => e.classList.remove('active'));
    document.getElementById('v-' + v).classList.add('active');
    document.getElementById('t-' + v).classList.add('active');
    if(v === 'ings') renderI();
    if(v === 'set') renderStapleTags();
    if(v === 'plan') renderP();
}

function saveS() {
    state.ak = document.getElementById('ak').value.trim();
    state.su = document.getElementById('su').value.trim();
    localStorage.setItem('ftf_v2', JSON.stringify(state));
    alert("Saved");
}

function renderI() {
    const list = document.getElementById('iList');
    list.innerHTML = (state.ings || []).map((i, idx) => `
        <div class="ing-item">
            <div><strong>${i.Item}</strong><br><small>${i.Qty} ${i.Unit || ''}</small></div>
            <button class="btn btn-s" style="width:auto; color:red;" onclick="eatItem('${i.Item}')">Eat</button>
        </div>
    `).join('');
}

function renderStapleTags() {
    document.getElementById('stapleTags').innerHTML = (state.staples || []).map((s, i) => `
        <div class="staple-tag">${s}<span onclick="state.staples.splice(${i},1);renderStapleTags()" style="cursor:pointer">×</span></div>
    `).join('');
}

function addStapleTag() {
    const v = document.getElementById('newStaple').value;
    if(v) { state.staples.push(v); document.getElementById('newStaple').value=''; renderStapleTags(); }
}

async function sync() {
    if(!state.su) return;
    document.getElementById('status').innerText = "Syncing...";
    const r = await fetch(state.su + "?action=pullAll&t=" + Date.now());
    const d = await r.json();
    state.ings = d.ingredients || [];
    state.staples = d.staples || [];
    if(d.plan) state.plan = d.plan;
    localStorage.setItem('ftf_v2', JSON.stringify(state));
    renderI(); renderP();
    document.getElementById('status').innerText = "Ready";
}

async function pushAll() {
    if(!state.su) return;
    document.getElementById('status').innerText = "Saving...";
    await fetch(state.su, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'pushAll', ...state }) });
    document.getElementById('status').innerText = "Ready";
}

function pushItem() {
    state.ings.push({ Item: document.getElementById('n').value, Qty: document.getElementById('q').value, Unit: document.getElementById('u').value });
    localStorage.setItem('ftf_v2', JSON.stringify(state));
    renderI(); pushAll();
}

function eatItem(name) {
    state.ings = state.ings.filter(i => i.Item !== name);
    localStorage.setItem('ftf_v2', JSON.stringify(state));
    renderI(); pushAll();
}

function renderP() {
    const cont = document.getElementById('pCont');
    if(!state.plan || !state.plan.days) return;

    const today = new Date();
    today.setHours(0,0,0,0);

    const futureDays = state.plan.days.filter(d => {
        const p = d.date.split('/');
        return new Date(p[2], p[1]-1, p[0]) >= today;
    }).sort((a,b) => {
        const ad = a.date.split('/'); const bd = b.date.split('/');
        return new Date(ad[2], ad[1]-1, ad[0]) - new Date(bd[2], bd[1]-1, bd[0]);
    });

    cont.innerHTML = futureDays.map(d => `
        <div class="day-card">
            <div class="day-h">${d.day} (${d.date})</div>
            <div class="m-box">
                <label>Lunch (Quick)</label>
                <p onclick="getRecipe('${d.lunch}')" style="cursor:pointer; text-decoration:underline;">${d.lunch}</p>
            </div>
            <div class="m-box">
                <label>Dinner (Family)</label>
                <p onclick="getRecipe('${d.dinner}')" style="cursor:pointer; text-decoration:underline;">${d.dinner}</p>
                <div style="margin-top:10px; display:flex; gap:5px;">
                    <button class="btn btn-s" style="width:auto; font-size:0.6rem; padding:5px 10px;" onclick="regenMeal('${d.date}')">🎲 Regen</button>
                    <button class="btn btn-s" style="width:auto; font-size:0.6rem; padding:5px 10px;" onclick="hintMeal('${d.date}')">💡 Hint</button>
                </div>
            </div>
        </div>
    `).join('');
}

async function generate() {
    const btn = document.getElementById('gBtn');
    if(!state.ak) return alert("API Key Required");
    btn.disabled = true; btn.innerText = "Chef is thinking...";
    
    // THE GLOBAL "NORMAL STAPLES" LOGIC
    const prompt = `
    Family of 3 (2 adults, 9yo girl). 2.1 ratio (Lunch for 1, Dinner for 3).
    Sunday Roast is mandatory.
    
    INVENTORY: ${state.ings.map(i => i.Qty + i.Unit + ' ' + i.Item).join(', ')}.
    USER STAPLES: ${state.staples.join(', ')}.
    
    UNIVERSAL PANTRY: Assume the user has all "normal" UK pantry essentials (Pasta, Rice, Flour, Sugar, Oil, Dried Herbs, Spices, Stock Cubes, Bread, Condiments/Mayo/Ketchup).
    
    Return ONLY JSON: {"days":[{"date":"DD/MM/YYYY", "day":"Monday", "lunch":"...", "dinner":"...", "used_ings":["item from inventory"]}]}. 
    Plan 7 days from ${new Date().toLocaleDateString('en-GB')}.`;

    try {
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${state.ak}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const d = await r.json();
        const text = d.candidates[0].content.parts[0].text.replace(/```json|```/gi, "").trim();
        state.plan = JSON.parse(text);
        localStorage.setItem('ftf_v2', JSON.stringify(state));
        renderP(); pushAll();
    } catch(e) { alert("Error generating plan."); }
    btn.disabled = false; btn.innerText = "✨ Generate New 7-Day Plan";
}

async function getRecipe(meal) {
    const m = document.createElement('div');
    m.className = 'recipe-modal';
    m.innerHTML = `<div style="max-width:500px; margin:auto;"><h2>Chef is writing...</h2></div>`;
    document.body.appendChild(m);

    const p = `
    TASK: Write a punchy recipe for "${meal}".
    
    CONSTRAINTS:
    1. Focus ONLY on the meal: ${meal}.
    2. Use items from Inventory: ${state.ings.map(i=>i.Item).join(', ')}.
    3. Use User Staples: ${state.staples.join(', ')}.
    4. You MAY use any standard UK pantry essentials (Pasta, Rice, Flour, Oil, Stock, Bread, Spices, etc.).
    5. DO NOT mention ingredients from the list that aren't used in this recipe. No jokes about other food in the fridge.
    6. Tone: Direct, casual, UK-centric.
    `;

    try {
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${state.ak}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
        });
        const d = await r.json();
        const recipeText = d.candidates[0].content.parts[0].text;
        m.innerHTML = `<div style="max-width:500px; margin:auto;"><h1 style="font-family:Playfair Display">${meal}</h1><div style="margin:20px 0; white-space:pre-wrap; line-height:1.5;">${recipeText}</div><button class="btn btn-p" onclick="this.parentElement.remove()">Close</button></div>`;
    } catch(e) { m.innerHTML = "Recipe failed. Probably the WiFi. Or the ghost in the machine."; }
}

async function regenMeal(date, hint = "") {
    document.getElementById('status').innerText = "Rerolling...";
    const p = `
    Regenerate Dinner for ${date}. ${hint ? 'Hint: '+hint : ''}. 
    Inventory: ${state.ings.map(i=>i.Item).join(',')}. 
    Standard UK Pantry items are available.
    Return JSON: {"dinner":"...", "used_ings":[]}`;

function hintMeal(date) { const h = prompt("Any specific idea?"); if(h) regenMeal(date, h); }

// Init
document.getElementById('ak').value = state.ak || '';
document.getElementById('su').value = state.su || '';
sh('plan');
</script>
</body>
</html>
