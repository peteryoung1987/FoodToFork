<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fridge to Fork</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3EE; --warm-white: #FDFAF7; --ink: #1C1917; --ink-soft: #44403C;
    --ink-muted: #78716C; --accent: #C2410C; --accent-soft: #FEF3EE; --accent-border: #FDBA99;
    --green: #15803D; --border: #E7E2DC; --border-strong: #D4CEC7; --card: #FFFFFF; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); line-height: 1.6; }
  header { background: var(--ink); color: var(--cream); padding: 1rem 1.5rem; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .tabs { background: var(--ink); display: flex; padding: 0 1.5rem; border-bottom: 1px solid #2C2927; }
  .tab { font-size: 0.8rem; font-weight: 500; text-transform: uppercase; color: #A8A29E; padding: 0.75rem 1rem; border: none; background: none; cursor: pointer; }
  .tab.active { color: var(--cream); border-bottom: 2px solid var(--accent); }
  .view { display: none; padding: 1.5rem; max-width: 760px; margin: 0 auto; }
  .view.active { display: block; }
  .setup-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .btn { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; padding: 0.6rem 1.25rem; border-radius: 8px; border: none; cursor: pointer; }
  .btn-primary { background: var(--accent); color: white; width: 100%; margin-top: 10px; }
  .btn-secondary { background: var(--card); border: 1px solid var(--border-strong); width: 100%; margin-top: 10px; }
  .day-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; }
  .day-header { padding: 0.75rem 1.25rem; background: var(--ink); color: var(--cream); font-family: 'Playfair Display', serif; }
  .meal-row { padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--border); }
  .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  input, select { width: 100%; padding: 0.5rem; margin: 5px 0 15px; border: 1px solid var(--border-strong); border-radius: 5px; }
</style>
</head>
<body>

<header><h1>Fridge to Fork</h1><span id="sheetStatus">No sheet</span></header>

<div class="tabs">
  <button class="tab active" onclick="showView('plan')">Plan</button>
  <button class="tab" onclick="showView('ingredients')">Ingredients</button>
  <button class="tab" onclick="showView('settings')">Settings</button>
</div>

<div id="view-plan" class="view active">
  <button class="btn btn-primary" id="generateBtn" onclick="generatePlan()">Generate Week Plan</button>
  <div id="planContent"></div>
</div>

<div id="view-ingredients" class="view">
  <div class="setup-card">
    <h2>Add Manually</h2>
    <input type="text" id="iName" placeholder="Item Name">
    <input type="date" id="iDate">
    <button class="btn btn-primary" onclick="addIngredient()">Add Item</button>
    <button class="btn btn-secondary" onclick="loadFromSheet()">↓ Sync from Google Sheet</button>
  </div>
  <div id="ingredientsList"></div>
</div>

<div id="view-settings" class="view">
  <div class="setup-card">
    <h2>Settings</h2>
    <label>Gemini API Key</label>
    <input type="password" id="apiKey">
    <label>Sheet CSV URL</label>
    <input type="text" id="sheetUrl" placeholder="Paste CSV link here">
    <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
  </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem('ftf_state')) || {
  ingredients: [],
  plan: null,
  settings: { apiKey: '', sheetUrl: '', staples: ['oil', 'salt', 'pepper', 'pasta', 'rice', 'eggs'] }
};

function save() { 
  localStorage.setItem('ftf_state', JSON.stringify(state)); 
  document.getElementById('sheetStatus').textContent = state.settings.sheetUrl ? "Connected" : "No Sheet";
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if(name === 'ingredients') renderIngredients();
}

function addIngredient() {
  const name = document.getElementById('iName').value;
  if(!name) return;
  state.ingredients.push({ name, useBy: document.getElementById('iDate').value, id: Date.now() });
  save();
  renderIngredients();
}

function renderIngredients() {
  const list = document.getElementById('ingredientsList');
  list.innerHTML = state.ingredients.map(i => `
    <div class="setup-card" style="display:flex; justify-content:space-between;">
      <div><strong>${i.name}</strong><br><small>${i.useBy || 'No date'}</small></div>
      <button onclick="removeIng(${i.id})">✕</button>
    </div>
  `).join('');
}

function removeIng(id) {
  state.ingredients = state.ingredients.filter(i => i.id !== id);
  save();
  renderIngredients();
}

async function loadFromSheet() {
  if(!state.settings.sheetUrl) return alert("Paste your CSV URL in Settings first!");
  try {
    const res = await fetch(state.settings.sheetUrl);
    const text = await res.text();
    const rows = text.split('\n').slice(1);
    state.ingredients = rows.filter(r => r.trim()).map(r => {
      const cols = r.split(',');
      return { name: cols[0], qty: cols[1], useBy: cols[4], id: Date.now() + Math.random() };
    });
    save();
    renderIngredients();
    alert("Synced!");
  } catch (e) { alert("Error: " + e.message); }
}

function saveSettings() {
  state.settings.apiKey = document.getElementById('apiKey').value;
  state.settings.sheetUrl = document.getElementById('sheetUrl').value;
  save();
  alert("Saved!");
}

async function generatePlan() {
  if(!state.settings.apiKey) return alert("Add API key in Settings!");
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  document.getElementById('planContent').innerHTML = '<div class="spinner"></div>';

  const prompt = `Plan 7 days of meals. Solo Lunch: assembly only. Family Dinner: cooked. Roast Sunday. Ingredients: ${state.ingredients.map(i => i.name).join(', ')}. Return ONLY JSON: {"days": [{"day": "Monday", "lunch": "...", "dinner": "..."}]}`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.settings.apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseMimeType: "application/json" }
      })
    });
    const data = await res.json();
    state.plan = JSON.parse(data.candidates[0].content.parts[0].text);
    save();
    renderPlan();
  } catch (e) { document.getElementById('planContent').innerHTML = "Error: " + e.message; }
  btn.disabled = false;
}

function renderPlan() {
  if(!state.plan) return;
  document.getElementById('planContent').innerHTML = state.plan.days.map(d => `
    <div class="day-card">
      <div class="day-header">${d.day}</div>
      <div class="meal-row"><strong>Lunch:</strong> ${d.lunch}</div>
      <div class="meal-row"><strong>Dinner:</strong> ${d.dinner}</div>
    </div>
  `).join('');
}

// Load initial data
document.getElementById('apiKey').value = state.settings.apiKey || '';
document.getElementById('sheetUrl').value = state.settings.sheetUrl || '';
renderPlan();
</script>
</body>
</html>
