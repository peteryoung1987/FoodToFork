<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fridge to Fork</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3EE;
    --warm-white: #FDFAF7;
    --ink: #1C1917;
    --ink-soft: #44403C;
    --ink-muted: #78716C;
    --accent: #C2410C;
    --accent-soft: #FEF3EE;
    --accent-border: #FDBA99;
    --green: #15803D;
    --green-soft: #F0FDF4;
    --amber: #B45309;
    --amber-soft: #FFFBEB;
    --border: #E7E2DC;
    --border-strong: #D4CEC7;
    --card: #FFFFFF;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  h1, h2, h3 { font-family: 'Playfair Display', serif; }

  header {
    background: var(--ink);
    color: var(--cream);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 { font-size: 1.4rem; font-weight: 400; }
  header span { font-size: 0.75rem; color: #A8A29E; }

  .tabs {
    background: var(--ink);
    display: flex;
    padding: 0 1.5rem;
    border-bottom: 1px solid #2C2927;
  }

  .tab {
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #A8A29E;
    padding: 0.75rem 1rem 0.75rem 0;
    margin-right: 1.5rem;
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }

  .tab.active { color: var(--cream); border-bottom-color: var(--accent); }

  .view { display: none; padding: 1.5rem; max-width: 760px; margin: 0 auto; }
  .view.active { display: block; }

  /* CARDS & UI */
  .setup-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
  label { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; color: var(--ink-muted); display: block; margin-bottom: 0.3rem; }
  
  input, select, textarea {
    width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; background: var(--warm-white);
  }

  .btn { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; padding: 0.6rem 1.25rem; border-radius: var(--radius-sm); border: none; cursor: pointer; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:disabled { background: var(--border-strong); cursor: not-allowed; }
  .btn-secondary { background: var(--card); border: 1px solid var(--border-strong); }

  .day-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; }
  .day-header { display: flex; justify-content: space-between; padding: 0.75rem 1.25rem; background: var(--ink); color: var(--cream); }
  .meal-row { padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; gap: 1rem; }
  .meal-type-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; color: var(--ink-muted); min-width: 65px; }
  
  .loading { text-align: center; padding: 3rem; }
  .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--warm-white); border-radius: var(--radius); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; }
</style>
</head>
<body>

<header>
  <h1>Fridge to Fork</h1>
  <span id="sheetStatus">No sheet connected</span>
</header>

<div class="tabs">
  <button class="tab active" onclick="showView('plan')">This Week</button>
  <button class="tab" onclick="showView('ingredients')">Ingredients</button>
  <button class="tab" onclick="showView('settings')">Settings</button>
</div>

<div id="view-plan" class="view active">
  <div class="week-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
    <h2>Meal Plan</h2>
    <button class="btn btn-primary" id="generateBtn" onclick="generatePlan()">Generate Week</button>
  </div>
  <div id="planContent"></div>
</div>

<div id="view-ingredients" class="view">
  <div class="setup-card">
    <h2>Add Ingredient</h2>
    <div class="field-row">
      <input type="text" id="iName" placeholder="Item name (e.g. Salmon)" />
      <input type="date" id="iDate" />
    </div>
    <div class="field-row" style="grid-template-columns: 1fr 1fr 1fr;">
      <input type="number" id="iQty" placeholder="Qty" />
      <select id="iStorage">
        <option value="fridge">Fridge</option>
        <option value="freezer">Freezer</option>
        <option value="cupboard">Cupboard</option>
      </select>
      <button class="btn btn-primary" onclick="addIngredient()">Add</button>
    </div>
    <button class="btn btn-secondary" onclick="loadFromSheet()" style="width:100%; margin-top:0.5rem;">↓ Sync from Google Sheet</button>
  </div>
  <div id="ingredientsList"></div>
</div>

<div id="view-settings" class="view">
    <div class="setup-card">
        <h2>API & Sheets</h2>
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" style="margin-bottom:1rem;" />
        <label>Google Sheet CSV URL</label>
        <input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/.../export?format=csv" />
        <button class="btn btn-primary" onclick="saveSettings()" style="margin-top:1rem;">Save Settings</button>
    </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target === this) this.classList.remove('open')">
    <div class="modal" id="modalContent"></div>
</div>

<script>
let state = JSON.parse(localStorage.getItem('ftf_state')) || {
  ingredients: [],
  plan: null,
  settings: { apiKey: '', sheetUrl: '', staples: ['salt', 'pepper', 'oil', 'eggs', 'pasta', 'rice'] }
};

function save() { 
    localStorage.setItem('ftf_state', JSON.stringify(state));
    updateSheetStatus();
}

function updateSheetStatus() {
    document.getElementById('sheetStatus').textContent = state.settings.sheetUrl ? "Sheet Linked" : "No Sheet";
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  const idx = ['plan', 'ingredients', 'settings'].indexOf(name);
  document.querySelectorAll('.tab')[idx].classList.add('active');
  if(name === 'ingredients') renderIngredients();
}

function addIngredient() {
    const name = document.getElementById('iName').value;
    const date = document.getElementById('iDate').value;
    if(!name) return;
    state.ingredients.push({ name, useBy: date, storage: document.getElementById('iStorage').value, qty: document.getElementById('iQty').value || 1, id: Date.now() });
    save();
    renderIngredients();
}

function renderIngredients() {
    const list = document.getElementById('ingredientsList');
    const sorted = [...state.ingredients].sort((a,b) => new Date(a.useBy) - new Date(b.useBy));
    list.innerHTML = sorted.map(i => `
        <div class="setup-card" style="display:flex; justify-content:space-between; align-items:center; padding: 0.75rem 1rem;">
            <div><strong>${i.name}</strong> <small>(${i.storage})</small><br><span style="font-size:0.8rem; color:var(--accent);">${i.useBy || 'No date'}</span></div>
            <button class="btn" onclick="removeIng(${i.id})">✕</button>
        </div>
    `).join('');
}

function removeIng(id) {
    state.ingredients = state.ingredients.filter(i => i.id !== id);
    save();
    renderIngredients();
}

function saveSettings() {
    state.settings.apiKey = document.getElementById('apiKey').value;
    state.settings.sheetUrl = document.getElementById('sheetUrl').value;
    save();
    alert("Settings saved, mate.");
}

async function generatePlan() {
    if(!state.settings.apiKey) return alert("Need an API key first!");
    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    document.getElementById('planContent').innerHTML = `<div class="loading"><div class="spinner"></div><p>Asking Gemini to sort the week out...</p></div>`;

    const prompt = `Plan 7 days of meals for Pete (Yorkshire lad, clean eating). 
    Solo Lunch: Assembly only, no cooking (e.g., prawns, cottage cheese, salads). 
    Family Dinner: Proper cooked meal for Pete, Wife, and 9yo daughter (mild-medium spice). 
    Sunday: Roast lunch (mandatory). 
    Use these ingredients (prioritize expiring soon): ${state.ingredients.map(i => i.name + ' exp: ' + i.useBy).join(', ')}. 
    Staples available: ${state.settings.staples.join(', ')}.
    Return ONLY JSON: {"days": [{"day": "Monday", "lunch": "description", "dinner": "description", "ingredients": []}]}`;

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.settings.apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await response.json();
        const rawText = data.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '');
        state.plan = JSON.parse(rawText);
        save();
        renderPlan();
    } catch (e) {
        document.getElementById('planContent').innerHTML = `<p>Bloody hell, it broke: ${e.message}</p>`;
    }
    btn.disabled = false;
}

function renderPlan() {
    if(!state.plan) return;
    document.getElementById('planContent').innerHTML = state.plan.days.map((d, idx) => `
        <div class="day-card">
            <div class="day-header"><span>${d.day}</span></div>
            <div class="meal-row">
                <div class="meal-type-label">Lunch</div>
                <div><strong>${d.lunch}</strong></div>
            </div>
            <div class="meal-row">
                <div class="meal-type-label">Dinner</div>
                <div><strong>${d.dinner}</strong></div>
            </div>
        </div>
    `).join('');
}

// Init
document.getElementById('apiKey').value = state.settings.apiKey;
document.getElementById('sheetUrl').value = state.settings.sheetUrl;
updateSheetStatus();
renderPlan();
</script>
</body>
</html>
