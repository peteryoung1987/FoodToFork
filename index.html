<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge to Fork</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #F7F3EE; --ink: #1C1917; --accent: #C2410C; --border: #E7E2DC; --card: #FFFFFF; --radius: 12px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); padding-bottom: 50px; }
        header { background: var(--ink); color: var(--cream); padding: 1.25rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
        #status { font-size: 0.7rem; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; }
        .tabs { background: var(--ink); display: flex; padding: 0 1rem; gap: 0.5rem; border-bottom: 1px solid #2C2927; }
        .tab { font-size: 0.75rem; font-weight: 700; color: #A8A29E; padding: 1rem; border: none; background: none; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--cream); border-bottom: 3px solid var(--accent); }
        .view { display: none; padding: 1.5rem 1rem; max-width: 500px; margin: 0 auto; }
        .view.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; color: #78716C; }
        input, select { width: 100%; padding: 0.7rem; margin-bottom: 1rem; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.9rem; }
        .btn { width: 100%; padding: 0.9rem; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-p { background: var(--accent); color: white; }
        .btn-s { background: white; border: 2px solid var(--border); color: #44403C; margin-top: 10px; }
        .edit-card { background: #FFF7ED; border: 2px solid var(--accent); padding: 1rem; border-radius: 10px; margin-bottom: 1rem; }
        .ing-row { display: flex; gap: 10px; align-items: flex-end; }
        .ing-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: white; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 0.75rem; }
        .day-card { background: white; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1.25rem; overflow: hidden; }
        .day-h { background: var(--ink); color: white; padding: 0.75rem 1.25rem; font-family: 'Playfair Display', serif; }
        .m-box { padding: 1rem; border-bottom: 1px solid var(--border); }
        .debug-log { background: #fee2e2; border: 1px solid #ef4444; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 0.7rem; margin-top: 10px; display: none; }
        .staple-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .staple-tag { background: #E7E2DC; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
        .remove-staple { cursor: pointer; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<header><h1>Fridge to Fork</h1><span id="status">Ready</span></header>

<div class="tabs">
    <button class="tab" id="t-plan" onclick="sh('plan')">Plan</button>
    <button class="tab" id="t-ings" onclick="sh('ings')">Fridge</button>
    <button class="tab" id="t-set" onclick="sh('set')">Settings</button>
</div>

<div id="v-plan" class="view">
    <button class="btn btn-p" id="gBtn" onclick="generate()">✨ Generate Week Plan</button>
    <div id="debugBox" class="debug-log"></div>
    <div id="pCont" style="margin-top:1rem;"></div>
</div>

<div id="v-ings" class="view">
    <div class="card">
        <label>Ingredient</label><input type="text" id="n" placeholder="e.g. Salmon Fillets">
        <div class="ing-row">
            <div style="flex:1"><label>Qty</label><input type="number" id="q" value="1"></div>
            <div style="flex:1"><label>Unit</label>
                <select id="u">
                    <option value="units">units</option>
                    <option value="g">g</option>
                </select>
            </div>
        </div>
        <div class="ing-row">
            <div style="flex:1"><label>Storage</label><select id="s"><option>Fridge</option><option>Freezer</option><option>Cupboard</option></select></div>
            <div style="flex:1"><label>Use By</label><input type="date" id="d"></div>
        </div>
        <button class="btn btn-p" onclick="pushItem()">Add to Fridge</button>
        <button class="btn btn-s" onclick="sync()">🔄 Refresh List</button>
    </div>
    <div id="iList"></div>
</div>

<div id="v-set" class="view">
    <div class="card">
        <h2>Staples Manager</h2>
        <div style="display:flex; gap:8px; margin-bottom:15px;">
            <input type="text" id="newStaple" placeholder="Add staple...">
            <button class="btn btn-p" style="width: auto;" onclick="addStapleTag()">Add</button>
        </div>
        <div id="stapleTags" class="staple-container"></div>
        <button class="btn btn-p" style="margin-top:20px;" onclick="pushAll()">💾 Sync & Save Everything</button>
    </div>
    <div class="card">
        <h2>Config</h2>
        <label>Gemini API Key</label><input type="password" id="ak">
        <label>Apps Script URL</label><input type="text" id="su">
        <button class="btn btn-s" onclick="saveS()">Save Credentials</button>
    </div>
</div>

<script>
let state = { ings: [], staples: [], plan: null, ak: '', su: '' };
try {
    const saved = localStorage.getItem('ftf_v2');
    if (saved) state = JSON.parse(saved);
} catch (e) {}

let editingIdx = null;

function sh(v) {
    document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
    document.getElementById('v-' + v).classList.add('active');
    document.querySelector(`.tab[onclick="sh('${v}')"]`).classList.add('active');
    if(v === 'ings') renderI();
    if(v === 'set') renderStapleTags();
}

function fmtD(dStr) {
    if(!dStr) return 'No Date';
    const d = new Date(dStr);
    return isNaN(d) ? dStr : d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function saveS() {
    state.ak = document.getElementById('ak').value.trim();
    state.su = document.getElementById('su').value.trim();
    localStorage.setItem('ftf_v2', JSON.stringify(state));
    alert("Settings saved.");
}

function renderStapleTags() {
    const container = document.getElementById('stapleTags');
    container.innerHTML = (state.staples || []).map((s, i) => `<div class="staple-tag">${s}<span class="remove-staple" onclick="removeStaple(${i})">×</span></div>`).join('');
}

function addStapleTag() {
    const input = document.getElementById('newStaple');
    if(input.value.trim()) { state.staples.push(input.value.trim()); input.value = ''; renderStapleTags(); }
}

function removeStaple(i) { state.staples.splice(i, 1); renderStapleTags(); }

function renderI() {
    const list = document.getElementById('iList');
    list.innerHTML = (state.ings || []).map((i, idx) => {
        // MATCHING HEADERS: Item (A), Category (B), Quantity (C), Unit (D), Storage (E), Use By (F)
        const name = i.Item || 'Unknown';
        const cat = i.Category || ''; 
        const qty = i.Quantity || ''; 
        const unit = i.Unit || '';     
        const store = i.Storage || ''; 
        const exp = i['Use By'] || '';

        if(editingIdx === idx) {
            return `<div class="edit-card">
                <label>Name</label><input type="text" id="ed-n" value="${name}">
                <label>Category</label><input type="text" id="ed-cat" value="${cat}">
                <div class="ing-row">
                    <div style="flex:1"><label>Qty</label><input type="number" id="ed-q" value="${qty}"></div>
                    <div style="flex:1"><label>Unit</label><input type="text" id="ed-u" value="${unit}"></div>
                </div>
                <div class="ing-row">
                    <div style="flex:1"><label>Storage</label><input type="text" id="ed-s" value="${store}"></div>
                    <div style="flex:1"><label>Use By</label><input type="date" id="ed-d" value="${exp ? new Date(exp).toISOString().split('T')[0] : ''}"></div>
                </div>
                <div style="display:flex; gap:10px;"><button class="btn btn-p" onclick="confirmEdit(${idx})">Save</button><button class="btn btn-s" onclick="cancelEdit()">Cancel</button></div>
            </div>`;
        }
        // This will now show: "Salmon Fillets | protein-meat | 3 units"
        return `<div class="ing-item">
            <div><strong>${name}</strong><br><small>${cat} | ${qty} ${unit} | ${store} | Exp: ${fmtD(exp)}</small></div>
            <div style="display:flex; gap:5px;">
                <button class="btn btn-s" style="width:auto;margin:0;padding:5px 10px;" onclick="startEdit(${idx})">Edit</button>
                <button class="btn btn-s" style="width:auto;margin:0;padding:5px 10px;border-color:#ef4444;color:#ef4444;" onclick="eatItem('${name}')">Eat</button>
            </div>
        </div>`;
    }).join('');
}

function confirmEdit(idx) {
    state.ings[idx] = { 
        Item: document.getElementById('ed-n').value,
        Category: document.getElementById('ed-cat').value, 
        Quantity: document.getElementById('ed-q').value, 
        Unit: document.getElementById('ed-u').value, 
        Storage: document.getElementById('ed-s').value,
        'Use By': document.getElementById('ed-d').value
    };
    editingIdx = null;
    localStorage.setItem('ftf_v2', JSON.stringify(state));
    renderI();
    pushAll();
}

async function sync() {
    if(!state.su) return;
    document.getElementById('status').innerText = "Syncing...";
    try {
        const r = await fetch(state.su + "?action=pullAll&t=" + Date.now());
        const d = await r.json();
        state.ings = d.ingredients || [];
        state.staples = d.staples || [];
        localStorage.setItem('ftf_v2', JSON.stringify(state));
        renderI();
        document.getElementById('status').innerText = "Ready";
    } catch(e) { document.getElementById('status').innerText = "Sync Error"; }
}

async function pushAll() {
    if(!state.su) return;
    document.getElementById('status').innerText = "Saving...";
    const payload = { action: 'pushAll', ings: state.ings, staples: state.staples, plan: state.plan };
    await fetch(state.su, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    document.getElementById('status').innerText = "Ready";
}

function pushItem() {
    state.ings.push({ 
        Item: document.getElementById('n').value, 
        Category: '', // Col B
        Quantity: document.getElementById('q').value, 
        Unit: document.getElementById('u').value, 
        Storage: document.getElementById('s').value, 
        'Use By': document.getElementById('d').value 
    });
    localStorage.setItem('ftf_v2', JSON.stringify(state));
    renderI();
    pushAll();
}

function eatItem(name) {
    state.ings = state.ings.filter(i => i.Item !== name);
    localStorage.setItem('ftf_v2', JSON.stringify(state));
    renderI();
    pushAll();
}

async function generate() {
  const btn = document.getElementById('gBtn');
  const debug = document.getElementById('debugBox');
  if(!state.ak) return alert("Add API Key");
  btn.disabled = true; debug.style.display = 'none';
  document.getElementById('pCont').innerHTML = "Chef is thinking...";
  const today = new Date().toLocaleDateString('en-GB');
  const prompt = `Return ONLY JSON format: {"days":[{"date":"DD/MM/YYYY", "day":"Monday","lunch":"...","dinner":"..."}]}. 
  Plan 7 days starting from ${today} using Ingredients: ${state.ings.map(i => i.Quantity + (i.Unit||'units') + ' ' + i.Item).join(', ')} and Staples: ${state.staples.join(', ')}. 
  Lunch: Healthy and low calorie. Dinner: Cooked family meal. Sunday: Roast.`;

  try {
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${state.ak}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const d = await r.json();
    let text = d.candidates[0].content.parts[0].text.replace(/```json|```/gi, "").trim();
    state.plan = JSON.parse(text);
    localStorage.setItem('ftf_v2', JSON.stringify(state));
    renderP();
    pushAll(); 
  } catch (e) { 
    debug.style.display = 'block'; 
    debug.innerText = "Error: " + e.message;
    document.getElementById('pCont').innerHTML = "Failed to generate plan."; 
  }
  btn.disabled = false;
}

function renderP() {
    const cont = document.getElementById('pCont');
    if(!cont || !state.plan || !state.plan.days) return;
    cont.innerHTML = state.plan.days.map(d => `<div class="day-card"><div class="day-h">${d.day} (${d.date})</div><div class="m-box"><label>Lunch</label><p>${d.lunch}</p></div><div class="m-box"><label>Dinner</label><p>${d.dinner}</p></div></div>`).join('');
}

document.getElementById('ak').value = state.ak || '';
document.getElementById('su').value = state.su || '';
if(state.plan) renderP();
sh('plan');
</script>
</body>
</html>
