<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fridge to Fork</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --cream: #F7F3EE; --ink: #1C1917; --accent: #C2410C; --border: #E7E2DC; --card: #FFFFFF; --radius: 12px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); line-height: 1.5; padding-bottom: 50px; }
  header { background: var(--ink); color: var(--cream); padding: 1.25rem; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
  #status { font-size: 0.7rem; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; }
  .tabs { background: var(--ink); display: flex; padding: 0 1rem; gap: 0.5rem; border-bottom: 1px solid #2C2927; }
  .tab { font-size: 0.75rem; font-weight: 700; color: #A8A29E; padding: 1rem; border: none; background: none; cursor: pointer; text-transform: uppercase; }
  .tab.active { color: var(--cream); border-bottom: 3px solid var(--accent); }
  .view { display: none; padding: 1.5rem 1rem; max-width: 500px; margin: 0 auto; }
  .view.active { display: block; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; color: #78716C; }
  input, select { width: 100%; padding: 0.7rem; margin-bottom: 1rem; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.9rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn { width: 100%; padding: 0.9rem; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
  .btn-p { background: var(--accent); color: white; }
  .btn-s { background: white; border: 2px solid var(--border); color: #44403C; margin-top: 10px; }
  .ing-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: white; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 0.75rem; }
  .day-card { background: white; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1.25rem; overflow: hidden; }
  .day-h { background: var(--ink); color: white; padding: 0.75rem 1.25rem; font-family: 'Playfair Display', serif; }
  .m-box { padding: 1rem; border-bottom: 1px solid var(--border); }
  .debug-log { background: #fee2e2; border: 1px solid #ef4444; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 0.7rem; margin-top: 10px; display: none; }
</style>
</head>
<body>

<header><h1>Fridge to Fork</h1><span id="status">Ready</span></header>

<div class="tabs">
  <button class="tab active" onclick="sh('plan')">The Plan</button>
  <button class="tab" onclick="sh('ings')">Fridge</button>
  <button class="tab" onclick="sh('set')">Settings</button>
</div>

<div id="v-plan" class="view active">
  <button class="btn btn-p" id="gBtn" onclick="generate()">✨ Generate Week Plan</button>
  <div id="debugBox" class="debug-log"></div>
  <div id="pCont" style="margin-top:1rem;"></div>
</div>

<div id="v-ings" class="view">
  <div class="card">
    <h2>Add Item</h2>
    <label>Ingredient Name</label>
    <input type="text" id="n" placeholder="e.g. Salmon Fillets">
    
    <div class="grid-2">
        <div><label>Qty</label><input type="number" id="q" value="1" min="1"></div>
        <div><label>Category</label>
            <select id="c">
                <option value="Meat/Fish">Meat/Fish</option>
                <option value="Veg">Veg</option>
                <option value="Dairy">Dairy</option>
                <option value="Other">Other</option>
            </select>
        </div>
    </div>
    
    <div class="grid-2">
        <div><label>Storage</label>
            <select id="s">
                <option value="Fridge">Fridge</option>
                <option value="Freezer">Freezer</option>
                <option value="Cupboard">Cupboard</option>
            </select>
        </div>
        <div><label>Use By</label><input type="date" id="d"></div>
    </div>
    
    <button class="btn btn-p" onclick="push('add')">Save to Sheet</button>
    <button class="btn btn-s" onclick="sync()">🔄 Refresh from Sheet</button>
  </div>
  <div id="iList"></div>
</div>

<div id="v-set" class="view">
  <div class="card">
    <h2>Setup</h2>
    <label>Gemini API Key</label><input type="password" id="ak">
    <label>Apps Script URL</label><input type="text" id="su">
    <button class="btn btn-p" onclick="saveS()">Save Config</button>
  </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem('ftf_v2')) || { ings: [], staples: [], plan: null, ak: '', su: '' };

function sh(v) {
  document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  if(v==='ings') renderI();
}

function saveS() {
  state.ak = document.getElementById('ak').value.trim();
  state.su = document.getElementById('su').value.trim();
  localStorage.setItem('ftf_v2', JSON.stringify(state));
  alert("Settings Saved");
}

function fmtDate(dStr) {
    if(!dStr) return '';
    const date = new Date(dStr);
    return isNaN(date) ? dStr : date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

async function sync() {
  if(!state.su) return;
  document.getElementById('status').innerText = "Syncing...";
  try {
    const r = await fetch(state.su);
    const d = await r.json();
    state.ings = d.ingredients.filter(i => i.Used !== "Yes" && i.Item);
    state.staples = d.staples;
    localStorage.setItem('ftf_v2', JSON.stringify(state));
    renderI();
    document.getElementById('status').innerText = "Synced";
  } catch(e) { document.getElementById('status').innerText = "Error"; }
}

async function push(action, name = null) {
  const payload = {
    action,
    name: name || document.getElementById('n').value,
    qty: document.getElementById('q').value,
    category: document.getElementById('c').value,
    storage: document.getElementById('s').value,
    useBy: document.getElementById('d').value
  };
  if(!payload.name && action === 'add') return;
  
  document.getElementById('status').innerText = "Updating...";
  await fetch(state.su, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
  if(action === 'add') document.getElementById('n').value = '';
  setTimeout(sync, 1500);
}

function renderI() {
  document.getElementById('iList').innerHTML = state.ings.map(i => `
    <div class="ing-item">
      <div><strong>${i.Item} (x${i.Qty || 1})</strong><small style="color:var(--accent); font-size:0.75rem;">${i.Storage} | ${fmtDate(i['Use By'])}</small></div>
      <button class="btn btn-s" style="width:auto; margin:0;" onclick="push('use', '${i.Item}')">Eat it</button>
    </div>
  `).join('');
}

async function generate() {
  const btn = document.getElementById('gBtn');
  const debug = document.getElementById('debugBox');
  btn.disabled = true; debug.style.display = 'none';
  document.getElementById('pCont').innerHTML = "Generating...";

  const prompt = `Plan 7 days of meals for Pete. 
  Solo Lunch: Assembly only, NO COOKING. 
  Family Dinner: Cooked for 3, mild spice. 
  Sunday: Traditional Roast. 
  Ingredients: ${state.ings.map(i => i.Item).join(', ')}. 
  Staples: ${state.staples.join(', ')}.
  Return ONLY JSON: {"days":[{"day":"Monday","lunch":"...","dinner":"..."}]}`;

  try {
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.ak}`, {
      method: 'POST',
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
    });
    const d = await r.json();
    
    if(!d.candidates) {
        debug.style.display = 'block';
        debug.innerText = "API Response Error: " + JSON.stringify(d);
        throw new Error("No candidates returned.");
    }

    state.plan = JSON.parse(d.candidates[0].content.parts[0].text);
    localStorage.setItem('ftf_v2', JSON.stringify(state));
    renderP();
  } catch (e) { document.getElementById('pCont').innerHTML = "Planning failed. Check debug log."; }
  btn.disabled = false;
}

function renderP() {
  if(!state.plan) return;
  document.getElementById('pCont').innerHTML = state.plan.days.map(d => `
    <div class="day-card"><div class="day-h">${d.day}</div>
    <div class="m-box"><label>Lunch</label><p>${d.lunch}</p></div>
    <div class="m-box"><label>Dinner</label><p>${d.dinner}</p></div></div>
  `).join('');
}

document.getElementById('ak').value = state.ak;
document.getElementById('su').value = state.su;
if(state.plan) renderP();
</script>
</body>
</html>
