<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge to Fork v0.023</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Fridge to Fork</h1>
    <span id="status" class="status-ready">Ready</span>
</header>

<nav class="tabs">
    <button class="tab active" id="t-plan" onclick="sh('plan')">Plan</button>
    <button class="tab" id="t-ings" onclick="sh('ings')">Fridge</button>
    <button class="tab" id="t-set" onclick="sh('set')">Settings</button>
</nav>

<!-- View: Plan -->
<main id="v-plan" class="view active">
    <button class="btn btn-p" id="gBtn" onclick="generatePlan()">✨ Generate 7-Day Plan</button>
    <div id="pCont" class="plan-container"></div>
</main>

<!-- View: Fridge -->
<main id="v-ings" class="view">
    <section class="card" id="ing-editor">
        <h3 id="editor-title">Add Item</h3>
        <input type="hidden" id="edit-idx" value="-1">
        
        <label>Item Name</label>
        <input type="text" id="n" placeholder="e.g. Salmon Fillets">
        
        <div class="grid-2">
            <div><label>Qty</label><input type="number" id="q" value="1"></div>
            <div>
                <label>Unit</label>
                <select id="u">
                    <option value="units">units</option>
                    <option value="g">g</option>
                    <option value="ml">ml</option>
                    <option value="packs">packs</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div>
                <label>Category</label>
                <select id="cat">
                    <option value="Protein">Protein</option>
                    <option value="Veg">Veg</option>
                    <option value="Dairy">Dairy</option>
                    <option value="Carbs">Carbs</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div>
                <label>Storage</label>
                <select id="store">
                    <option value="Fridge">Fridge</option>
                    <option value="Freezer">Freezer</option>
                    <option value="Pantry">Pantry</option>
                </select>
            </div>
        </div>

        <label>Use By Date</label>
        <input type="date" id="ub">

        <div class="grid-2">
            <button class="btn btn-p" id="save-btn" onclick="saveItem()">Save to Fridge</button>
            <button class="btn btn-s" id="cancel-btn" onclick="resetForm()" style="display:none;">Cancel</button>
        </div>
    </section>
    
    <button class="btn btn-s" onclick="syncAll()" style="margin-bottom: 1rem;">🔄 Sync with Sheet</button>
    <div id="iList"></div>
</main>

<!-- View: Settings -->
<main id="v-set" class="view">
    <div class="card">
        <h2>Staples</h2>
        <div class="staple-input-group">
            <input type="text" id="newStaple" placeholder="e.g. Olive Oil">
            <button class="btn btn-p" onclick="addStaple()">Add</button>
        </div>
        <div id="stapleTags" class="tag-container"></div>
    </div>

    <div class="card">
        <h2>System Config</h2>
        <label>Gemini API Key</label>
        <input type="password" id="ak" placeholder="Paste Key Here">
        <label>Apps Script URL</label>
        <input type="text" id="su" placeholder="https://script.google.com/...">
        <button class="btn btn-s" onclick="updateCredentials()">Update Credentials</button>
    </div>
</main>

<!-- Scripts -->
<script src="app.js"></script>
<script src="render.js"></script>
<script src="ai.js"></script>
</body>
</html>
