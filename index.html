<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge to Fork v2</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f4f4f9; color: #333; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .sync-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .sync-row button { flex: 1; padding: 12px; color: white; }
        #pullBtn { background: #2196F3; }
        #pushBtn { background: #4CAF50; }
        
        #gBtn { width: 100%; padding: 15px; background: #673AB7; color: white; font-size: 1.1rem; margin-bottom: 20px; }
        
        .meal-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .meal-card h4 { margin: 0 0 10px 0; color: #666; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .meal-item { padding: 8px 0; cursor: pointer; display: flex; align-items: center; }
        .meal-item:hover { color: #2196F3; }
        .meal-item span { margin-right: 10px; }

        /* Modal styling */
        #recipeModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
        .modal-content { background: #fff; color: #333; margin: 5% auto; padding: 20px; width: 90%; max-width: 500px; border-radius: 15px; position: relative; }
        .close-btn { position: sticky; top: 0; float: right; background: #ff4444; color: white; padding: 5px 10px; border-radius: 5px; }
        
        #debugBox { background: #ffebee; color: #c62828; padding: 10px; border-radius: 8px; margin-top: 20px; display: none; font-family: monospace; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h2>🍴 Fridge to Fork</h2>

    <div class="sync-row">
        <button id="pullBtn" onclick="sync('pull')">📥 Pull Cloud</button>
        <button id="pushBtn" onclick="sync('push')">📤 Push Cloud</button>
    </div>

    <button id="gBtn" onclick="generate()">🎲 Generate 7-Day Plan</button>

    <div id="pCont">
        <!-- Meal cards will render here -->
    </div>

    <div id="debugBox"></div>

    <!-- Recipe Modal -->
    <div id="recipeModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">Close</button>
            <div id="recipeBody"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        let state = JSON.parse(localStorage.getItem('ftf_v2')) || {
            ings: [],
            staples: [],
            plan: { days: [] },
            ak: 'YOUR_GEMINI_API_KEY', // Ensure this is set
            scriptUrl: 'YOUR_APPS_SCRIPT_URL' // Ensure this is set
        };

        const MODEL = "gemini-3.1-flash-lite-preview";

        // Save state locally
        function save() {
            localStorage.setItem('ftf_v2', JSON.stringify(state));
        }

        // --- UI RENDERING ---
        function renderAll() {
            renderP();
            // Add calls to render your ingredients/staples lists here if they are on the same page
        }

        function renderP() {
            const cont = document.getElementById('pCont');
            if (!state.plan || !state.plan.days || state.plan.days.length === 0) {
                cont.innerHTML = "<p style='text-align:center; color:#888;'>No plan active. Hit generate or pull from cloud.</p>";
                return;
            }

            cont.innerHTML = state.plan.days.map(d => `
                <div class="meal-card">
                    <h4>${d.date} — ${d.day}</h4>
                    <div class="meal-item" onclick="getRecipe('${d.lunch}')">
                        <span>🥗</span> <strong>Lunch:</strong> ${d.lunch}
                    </div>
                    <div class="meal-item" onclick="getRecipe('${d.dinner}')">
                        <span>🍲</span> <strong>Dinner:</strong> ${d.dinner}
                    </div>
                </div>
            `).join('');
        }

        // --- SYNC LOGIC ---
        async function sync(type) {
            const btn = document.getElementById(type === 'push' ? 'pushBtn' : 'pullBtn');
            const oldText = btn.innerText;
            btn.innerText = "Processing...";

            try {
                if (type === 'pull') {
                    const r = await fetch(state.scriptUrl, { 
                        method: 'POST', 
                        body: JSON.stringify({ action: 'pullAll' }) 
                    });
                    const data = await r.json();
                    
                    state.ings = data.ings;
                    state.staples = data.staples;
                    
                    // Transform flat sheet rows back into our grouped Day objects
                    const grouped = data.plan.reduce((acc, curr) => {
                        let day = acc.find(a => a.date === curr.date);
                        if (!day) {
                            day = { date: curr.date, day: "", lunch: "", dinner: "" };
                            acc.push(day);
                        }
                        if (curr.type === 'Lunch') day.lunch = curr.name;
                        if (curr.type === 'Dinner') day.dinner = curr.name;
                        return acc;
                    }, []);
                    
                    state.plan = { days: grouped };
                    save();
                    renderAll();
                } else {
                    // Push current state to Cloud
                    await fetch(state.scriptUrl, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify({ action: 'pushAll', ...state }) 
                    });
                }
                btn.innerText = "✅ Success";
            } catch (e) {
                btn.innerText = "❌ Error";
                document.getElementById('debugBox').style.display = 'block';
                document.getElementById('debugBox').innerText = e.message;
            }
            setTimeout(() => btn.innerText = oldText, 2000);
        }

        // --- GENERATION LOGIC ---
        async function generate() {
            const btn = document.getElementById('gBtn');
            const cont = document.getElementById('pCont');
            btn.disabled = true;
            cont.innerHTML = "<p style='text-align:center;'>✨ Chef is brainstorming... (Using 3.1 Flash Lite)</p>";

            const today = new Date().toLocaleDateString('en-GB');
            const prompt = `Return ONLY JSON format: {"days":[{"date":"DD/MM/YYYY", "day":"DayName", "lunch":"Meal Name", "dinner":"Meal Name"}]}. 
            Plan exactly 7 days starting from ${today}.
            Available Ingredients: ${state.ings.map(i => i.Item).join(', ')}.
            Current Staples: ${state.staples.join(', ')}.
            Rule: Assume standard pantry (oil, salt, pepper, flour). Lunch is no-cook. Dinner is family meal. Sunday is Roast. 
            Vary the meals, avoid repetition.`;

            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${state.ak}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const d = await r.json();
                if (d.error) throw new Error(d.error.message);

                let text = d.candidates[0].content.parts[0].text.replace(/```json|```/gi, "").trim();
                state.plan = JSON.parse(text);
                save();
                renderP();
            } catch (e) {
                cont.innerHTML = "⚠️ Generation failed.";
                document.getElementById('debugBox').style.display = 'block';
                document.getElementById('debugBox').innerText = e.message;
            }
            btn.disabled = false;
        }

        // --- ON-DEMAND RECIPE LOGIC ---
        async function getRecipe(mealName) {
            const modal = document.getElementById('recipeModal');
            const body = document.getElementById('recipeBody');
            modal.style.display = 'block';
            body.innerHTML = `<h3>Cooking up instructions for ${mealName}...</h3>`;

            const prompt = `Direct, succinct recipe for "${mealName}". 
            Context: Use ${state.ings.map(i => i.Item).join(', ')} and ${state.staples.join(', ')}. 
            Tone: Casual, helpful, UK English. No waffle. Give clear steps.`;

            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${state.ak}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await r.json();
                const recipeText = d.candidates[0].content.parts[0].text;
                body.innerHTML = `<h2>${mealName}</h2><div style="white-space: pre-wrap; line-height:1.5;">${recipeText}</div>`;
            } catch (e) {
                body.innerHTML = "Failed to load recipe. Just wing it? (Error: " + e.message + ")";
            }
        }

        function closeModal() {
            document.getElementById('recipeModal').style.display = 'none';
        }

        // Initial Boot
        window.onload = renderAll;
    </script>
</body>
</html>
